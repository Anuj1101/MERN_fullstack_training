<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" name="" id="t" onchange=cfact()>
    <button onclick=cfact()>click me</button>
    <p id="nam"></p>
    <script>
        age=prompt("enter your age");
        let isvoter=(age)=>age>=18;
        console.log(isvoter(age))
        function fact(a){
            if(a<=0){
                return(1);
            }
            return(a*fact(a-1));
        }
        function cfact(){
            var m=document.querySelector("#t");
            var moon=document.querySelector("#nam");
            var o=m.value;
            moon.innerText=fact(o);
            return fact(o);
        }
    </script>
</body>
</html>
