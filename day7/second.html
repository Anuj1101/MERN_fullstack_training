<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let students = ["ayush","Shrijan","Uttam","Rahul","Vivek","Anuj"];
        console.log(students.length);
        students.push("Manjesh");
        console.log(students.length);
        console.log(students);
        students.pop();
        console.log(students);
        //unshift add data to first position
        students.unshift("lalit");
        //to remove data from front
        students.shift()
        for(i=0;i<students.length;i++){
            console.log(i+" - "+students[i])
        }
    </script>
</body>
</html>
